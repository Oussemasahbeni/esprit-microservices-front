@let user = _user();
<ul hlmSidebarMenu>
  <li hlmSidebarMenuItem>
    <button type="button" hlmSidebarMenuButton size="lg" align="end" [hlmDropdownMenuTrigger]="menu" [side]="_menuSide()">
      <hlm-avatar class="rounded-lg">
        <img hlmAvatarImage [src]="user.name" [alt]="user.name" />
        <span class="rounded-lg bg-[#FD005B] text-white" hlmAvatarFallback> {{userInitials()}} </span>
      </hlm-avatar>
      <div class="grid flex-1 text-left text-sm leading-tight">
        <span class="truncate font-medium">{{ user.name }}</span>
        <span class="truncate text-xs">{{ user.email }}</span>
      </div>
      <ng-icon name="lucideChevronsUpDown" class="ml-auto text-base" />
    </button>
  </li>
</ul>

<ng-template #menu>
  <hlm-dropdown-menu class="min-w-56 rounded-lg">
    <hlm-dropdown-menu-label>
      <div class="flex items-center gap-2 px-1 py-1.5 text-left text-sm">
        <hlm-avatar class="rounded-lg">
          <img hlmAvatarImage [src]="user.name" [alt]="user.name" />
          <span class="rounded-lg bg-[#FD005B] text-white" hlmAvatarFallback>{{userInitials()}}</span>
        </hlm-avatar>
        <div class="grid flex-1 text-left text-sm leading-tight">
          <span class="truncate font-medium">{{ user.name }}</span>
          <span class="truncate text-xs">{{ user.email }}</span>
        </div>
      </div>
    </hlm-dropdown-menu-label>
    <hlm-dropdown-menu-separator />
    <hlm-dropdown-menu-group>
      <button type="button" hlmDropdownMenuItem>
        <ng-icon name="lucideBadgeCheck" />
        {{ 'navUser.account' | transloco }}
      </button>
      <!-- Subscription -->
      <button type="button" hlmDropdownMenuItem class="flex items-center justify-center gap-2">
        <ng-icon name="lucideCreditCard" />
        {{ 'navUser.subscription' | transloco }}
        <span
          hlmBadge
          class="ms-auto rounded-sm border border-green-200 bg-green-50 text-green-700 dark:border-green-800 dark:bg-green-950 dark:text-green-300"
        >
          <ng-icon name="lucideGem" />
          {{ 'navUser.pro' | transloco }}
        </span>
      </button>

      <!-- Theme Selector -->
      <ng-container *transloco="let t; prefix: 'navUser'">
        <button type="button" hlmDropdownMenuItem side="right" align="start" [hlmDropdownMenuTrigger]="themeTpl">
          <ng-icon name="lucidePalette" />
          <span> {{ t('theme') }} </span>
          <hlm-dropdown-menu-item-sub-indicator class="rtl:rotate-180" />
        </button>

        <ng-template #themeTpl>
          <hlm-dropdown-menu-sub *transloco="let t">
            @let theme = currentTheme();

            <button type="button" hlmDropdownMenuCheckbox [checked]="theme === 'light'" (click)="setTheme('light')">
              <div class="flex items-center gap-2">
                <ng-icon hlmIcon name="lucideSun" size="sm" />
                <span> {{ t('theme.light') }} </span>
              </div>
              <hlm-dropdown-menu-checkbox-indicator />
            </button>

            <button type="button" hlmDropdownMenuCheckbox [checked]="theme === 'dark'" (click)="setTheme('dark')">
              <div class="flex items-center gap-2">
                <ng-icon hlmIcon name="lucideMoon" size="sm" />
                <span> {{ t('theme.dark') }} </span>
              </div>
              <hlm-dropdown-menu-checkbox-indicator />
            </button>

            <button type="button" hlmDropdownMenuCheckbox [checked]="theme === 'system'" (click)="setTheme('system')">
              <div class="flex items-center gap-2">
                <ng-icon hlmIcon name="lucideMonitor" size="sm" />
                <span> {{ t('theme.system') }} </span>
              </div>
              <hlm-dropdown-menu-checkbox-indicator />
            </button>
          </hlm-dropdown-menu-sub>
        </ng-template>
      </ng-container>

      <!-- Language Selector -->
      <button type="button" hlmDropdownMenuItem side="right" align="start" [hlmDropdownMenuTrigger]="languageTpl">
        <ng-icon name="lucideGlobe" />
        <span *transloco="let t; prefix: 'navUser'"> {{ t('language') }} </span>
        <hlm-dropdown-menu-item-sub-indicator class="rtl:rotate-180" />
      </button>

      <ng-template #languageTpl>
        <hlm-dropdown-menu-sub>
          @for (lang of availableLanguages(); track lang.code) {
          <button type="button" hlmDropdownMenuItem (click)="setLang(lang.code)">
            <span>{{ lang.label }}</span>
            @if (currentLang() === lang.code) {
            <ng-icon hlmIcon name="lucideCheck" size="sm" class="ms-auto" />
            }
          </button>
          }
        </hlm-dropdown-menu-sub>
      </ng-template>
    </hlm-dropdown-menu-group>
    <hlm-dropdown-menu-separator />
    <!-- Help and Support button -->
    <button type="button" hlmDropdownMenuItem>
      <ng-icon name="lucideHelpCircle" />
      {{ 'navUser.help' | transloco }}
    </button>
    <button type="button" hlmDropdownMenuItem (click)="onLogout()">
      <ng-icon name="lucideLogOut" />
      {{ 'navUser.logout' | transloco }}
    </button>
  </hlm-dropdown-menu>
</ng-template>
