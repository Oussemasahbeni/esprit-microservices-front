<div *transloco="let t; prefix: 'dashboard1'" class="@container/main flex flex-col gap-2">
  <div class="flex flex-col gap-4 md:gap-6">
    <!-- Metric Cards Row -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 2xl:grid-cols-3">
      @for (card of cards(); track card.titleKey) {
        <adm-metric-card
          [title]="t(card.titleKey)"
          [tooltip]="card.tooltipKey ? t(card.tooltipKey) : ''"
          [value]="card.value"
          [description]="t(card.descriptionKey)"
          [icon]="card.icon"
          [chartData]="card.chartData"
          [chartColor]="card.chartColor"
          [trendValue]="card.trendValue"
          [trendUp]="card.trendUp"
        />
      }
    </div>

    @defer (on viewport) {
      <!-- Chart Cards Row -->
      <div class="grid grid-cols-1 gap-4 xl:grid-cols-3">
        <adm-area-chart-card class="xl:col-span-2" />
        <adm-bar-chart-card />
      </div>
    } @placeholder {
      <div class="grid grid-cols-1 gap-4 xl:grid-cols-3">
        <div class="bg-card h-88 animate-pulse rounded-xl border xl:col-span-2"></div>
        <div class="bg-card h-88 animate-pulse rounded-xl border"></div>
      </div>
    }

    @defer (on viewport) {
      <!-- Payments and Team Members Row -->
      <div class="grid grid-cols-1 gap-4 xl:grid-cols-2">
        <adm-payments-table [payments]="payments()" />
        <adm-team-members-card [members]="teamMembers()" />
      </div>
    } @placeholder {
      <div class="grid grid-cols-1 gap-4 xl:grid-cols-2">
        <div class="bg-card h-120 animate-pulse rounded-xl border"></div>
        <div class="bg-card h-120 animate-pulse rounded-xl border"></div>
      </div>
    }
  </div>
</div>
