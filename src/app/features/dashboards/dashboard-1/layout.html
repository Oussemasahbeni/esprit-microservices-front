<div *transloco="let t; prefix: 'dashboard1.layout'">
  <header class="mb-8">
    <div class="flex w-full flex-col items-start justify-between gap-4 sm:flex-row">
      <h1 class="text-3xl font-bold tracking-tight">{{ t('title') }}</h1>

      <div class="flex gap-3">
        <button type="button" hlmBtn variant="outline">
          <ng-icon hlmIcon name="lucideFilter" size="sm" />
          {{ t('filterBy') }}
        </button>
        <button type="button" hlmBtn variant="default">
          <ng-icon hlmIcon name="lucideDownload" size="sm" />
          {{ t('export') }}
        </button>
      </div>
    </div>
  </header>

  <hlm-tabs class="space-y-2" [tab]="selectedTab()" (tabActivated)="onTabChange($event)">
    <hlm-tabs-list>
      <button type="button" hlmTabsTrigger="overview">
        <ng-icon hlmIcon name="lucideHome" size="sm" />
        {{ t('tabs.overview') }}
      </button>
      <button type="button" hlmTabsTrigger="analytics">
        <ng-icon hlmIcon name="lucideBarChart2" size="sm" />
        {{ t('tabs.analytics') }}
      </button>
      <button type="button" disabled hlmTabsTrigger="reports">
        <ng-icon hlmIcon name="lucideFileText" size="sm" />
        {{ t('tabs.reports') }}
      </button>
    </hlm-tabs-list>

    <div hlmTabsContent="overview">
      @defer (when selectedTab() === 'overview') {
        <adm-dashboard1-overview />
      } @placeholder {
        <hlm-spinner />
      }
    </div>

    <div hlmTabsContent="analytics">
      @defer (when selectedTab() === 'analytics') {
        <adm-dashboard1-analytics />
      } @placeholder {
        <hlm-spinner />
      }
    </div>
  </hlm-tabs>
</div>
