<div *transloco="let t; prefix: 'dashboard2'" class="text-foreground min-h-screen font-sans">
  <header class="mb-8 flex flex-col items-start justify-between gap-4 md:flex-row md:items-center">
    <div>
      <h1 class="text-3xl font-bold tracking-tight">{{ t('header.title') }}</h1>
      <p class="text-muted-foreground mt-1">{{ t('header.subtitle') }}</p>
    </div>
    <div class="flex gap-3">
      <adm-filter-dialog (filterApplied)="onFilterApplied($event)" />
      <button type="button" hlmBtn variant="default" (click)="onExportData()">
        <ng-icon hlmIcon name="lucideDownload" size="sm" />
        {{ t('header.export') }}
      </button>
    </div>
  </header>

  <div class="mb-6 grid grid-cols-1 gap-6 xl:grid-cols-12">
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:col-span-5">
      @for (card of statCards(); track card.labelKey) {
        <adm-stat-card [data]="card" (menuClick)="onStatCardMenuClick(card.labelKey)" />
      }
    </div>

    <adm-revenue-chart-card class="xl:col-span-7" />
  </div>

  <div class="grid grid-cols-1 gap-6 xl:grid-cols-12">
    <adm-transactions-table class="xl:col-span-8" [transactions]="transactions()" />

    <adm-visitor-chart-card class="xl:col-span-4" />
  </div>
</div>
